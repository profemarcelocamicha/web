<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Estructura HTML</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            border:color(blue)
        }

        header{
            height:30%;
        }

        nav{
            height:15%;
        }

        nav button{
        }

        main{
            height:45%;
        }

        footer{
            height:10%;
        }
    </style>

</head>
<body>

    <header>
        HEADER (30%)
    </header>

    <nav>
        <button>Inicio</button>
        <button>Productos</button>
        <button>Servicios</button>
        <button>Contacto</button>
    </nav>

    <main>
        MAIN (45%)
    </main>

    <footer>
        FOOTER (10%)
    </footer>

</body>
</html>

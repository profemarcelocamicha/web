<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Estructura HTML</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            flex-direction:column;
            font-family:Arial, Helvetica, sans-serif;
        }

        header{
            height:30%;
            background:#4CAF50;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:2em;
        }

        nav{
            height:15%;
            background:#333;
            display:flex;
            justify-content:space-evenly;
            align-items:center;
        }

        nav button{
            padding:12px 25px;
            font-size:16px;
            cursor:pointer;
            border:none;
            border-radius:5px;
        }

        main{
            height:45%;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:1.8em;
        }

        footer{
            height:10%;
            background:#222;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:1.2em;
        }
    </style>

</head>
<body>

    <header>
        HEADER (30%)
    </header>

    <nav>
        <button>Inicio</button>
        <button>Productos</button>
        <button>Servicios</button>
        <button>Contacto</button>
    </nav>

    <main>
        MAIN (45%)
    </main>

    <footer>
        FOOTER (10%)
    </footer>

</body>
</html>

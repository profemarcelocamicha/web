<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Flexbox - Menú lateral</title>

    <style>
        header,
        nav,
        main,
        footer {
            border: 2px solid black;
        }

        /* Contenedor del menú y el contenido */
        .contenido {
            display: flex;
        }

        nav {
            flex: 1;
        }

        main {
            flex: 9;
        }
    </style>
</head>

<body>

    <header>
        <h1>Mi Página Web</h1>
    </header>

    <div class="contenido">

        <nav>
            <button>Inicio</button><br><br>
            <button>Productos</button><br><br>
            <button>Servicios</button><br><br>
            <button>Contacto</button>
        </nav>

        <main>
            <h2>Contenido Principal</h2>
            <p>Aquí se mostrará el contenido de la página.</p>
        </main>

    </div>

    <footer>
        Pie de página
    </footer>

</body>

</html>
